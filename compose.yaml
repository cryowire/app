services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - cryo-data:/data
    environment:
      - DATA_DIR=/data
      - HOST=0.0.0.0
      - PORT=8000
      - REPO_URL=${REPO_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/repo')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  tunnel:
    image: cloudflare/cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    env_file:
      - .env
    command:
      - tunnel
      - --no-autoupdate
      - --no-chunked-encoding
      - run
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cryo-data:
